<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>

    <div>
      <div style="background: #0E1A36; height: 60px;"></div>
      <div class="token-name" style="margin-top: 6px;">ink-1</div>
      <div class="token-value">#0E1A36</div>
    </div>
    <div>
      <div style="background: #2E3A57; height: 60px;"></div>
      <div class="token-name" style="margin-top: 6px;">ink-2</div>
      <div class="token-value">#2E3A57</div>
    </div>
    <div>
      <div style="background: #6A7392; height: 60px;"></div>
      <div class="token-name" style="margin-top: 6px;">ink-3</div>
      <div class="token-value">#6A7392</div>
    </div>
    <div>
      <div style="background: #9CA3BC; height: 60px;"></div>
      <div class="token-name" style="margin-top: 6px;">ink-4</div>
      <div class="token-value">#9CA3BC</div>
    </div>
  </div>
</div>
</body></html>
