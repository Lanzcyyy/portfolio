<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<style>
  .field {
    font-family: var(--font-body); font-size: 15px; color: var(--ink-1);
    background: transparent; border: 0; border-bottom: 1px solid var(--border-strong);
    padding: 10px 0; width: 100%; outline: 0;
  }
  .field::placeholder { color: var(--ink-4); }
  .field:focus { border-bottom-color: var(--azure-500); }
  .field-lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 4px; display: block; }
</style>
<div class="card" style="padding: 24px 32px;">
  <div class="label" style="margin-bottom: 14px;">Form fields — underline-only</div>
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
    <div>
      <label class="field-lbl">Name</label>
      <input class="field" placeholder="Your name" />
    </div>
    <div>
      <label class="field-lbl">Email</label>
      <input class="field" value="maren@studiomira.co" />
    </div>
  </div>
  <div class="token-value" style="margin-top: 14px;">no boxes, no fills · accent on focus · mono label above</div>
</div>
</body></html>
