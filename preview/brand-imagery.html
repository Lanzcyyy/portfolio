<!-- @dsCard group="Brand" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="padding: 0;">
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0;">
    <div style="background: linear-gradient(135deg, #d4b896 0%, #b8966a 40%, #8a6e4a 100%); padding: 24px; min-height: 160px; position: relative; filter: saturate(0.92);">
      <span style="font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.9);">IMAGERY · WARM</span>
    </div>
    <div style="background: linear-gradient(135deg, #e8e2d1 0%, #c4b89e 50%, #8a7d5e 100%); padding: 24px; min-height: 160px; filter: saturate(0.85);">
      <span style="font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(60,50,30,0.8);">NATURAL LIGHT</span>
    </div>
  </div>
  <div style="padding: 14px 24px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; color: var(--ink-3); text-transform: uppercase;">filter: saturate(0.92) at rest · saturate(1) on hover</div>
</div>
</body></html>
