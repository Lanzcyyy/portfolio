<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>

    <div style="text-align: center;">
      <div style="width: 88px; height: 60px; background: #FFFFFF; box-shadow: 0 1px 2px rgba(14,26,54,0.04), 0 1px 1px rgba(14,26,54,0.03);"></div>

    </div>
    <div style="text-align: center;">
      <div style="width: 88px; height: 60px; background: #FFFFFF; box-shadow: 0 4px 14px rgba(14,26,54,0.06), 0 1px 3px rgba(14,26,54,0.04);"></div>
      <div class="token-name" style="margin-top: 10px;">shadow-md</div>
    </div>
    <div style="text-align: center;">
      <div style="width: 88px; height: 60px; background: #FFFFFF; box-shadow: 0 12px 36px rgba(14,26,54,0.10), 0 2px 6px rgba(14,26,54,0.04);"></div>
      <div class="token-name" style="margin-top: 10px;">shadow-lg</div>
    </div>
    <div style="text-align: center;">
      <div style="width: 88px; height: 60px; background: #FFFFFF; box-shadow: 0 0 0 3px rgba(37,71,200,0.25);"></div>

    </div>
  </div>
