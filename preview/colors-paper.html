<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="padding: 24px 32px;">
  <div class="label" style="margin-bottom: 14px;">Paper — backgrounds</div>
  <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;">
    <div>
      <div style="background: #FFFFFF; height: 60px; border: 1px solid var(--border);"></div>
      <div class="token-name" style="margin-top: 6px;">paper-0</div>
      <div class="token-value">#FFFFFF</div>
    </div>
    <div>
      <div style="background: #F8F4EC; height: 60px; border: 1px solid var(--border);"></div>
      <div class="token-name" style="margin-top: 6px;">paper-1</div>
      <div class="token-value">#F8F4EC</div>
    </div>
    <div>
      <div style="background: #EFEAE0; height: 60px;"></div>
      <div class="token-name" style="margin-top: 6px;">paper-2</div>
      <div class="token-value">#EFEAE0</div>
    </div>
    <div>
      <div style="background: #E4DED2; height: 60px;"></div>
      <div class="token-name" style="margin-top: 6px;">paper-3</div>
      <div class="token-value">#E4DED2</div>
    </div>
  </div>
</div>
</body></html>
