<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="padding: 20px 32px;">
  <div style="display: flex; align-items: baseline; gap: 24px; flex-wrap: wrap;">
    <div style="font-family: var(--font-body); font-weight: 300; font-size: 56px; line-height: 1; color: var(--ink-1); letter-spacing: -0.025em;">Aa</div>
    <div style="font-family: var(--font-body); font-weight: 300; font-size: 40px; line-height: 1; color: var(--ink-1); letter-spacing: -0.025em;">Aa</div>
    <div style="font-family: var(--font-body); font-weight: 400; font-size: 28px; line-height: 1; color: var(--ink-1); letter-spacing: -0.015em;">Aa</div>
    <div style="font-family: var(--font-body); font-size: 22px; line-height: 1; color: var(--ink-1); font-weight: 500;">Aa</div>
    <div style="font-family: var(--font-body); font-size: 16px; line-height: 1; color: var(--ink-1);">Aa</div>
    <div style="font-family: var(--font-mono); font-size: 12px; line-height: 1; color: var(--ink-2); letter-spacing: 0.06em;">AA</div>
  </div>
  <div style="display: flex; gap: 16px; margin-top: 14px;">
    <span class="token-value">96 · h1 light</span>
    <span class="token-value">48 · h2 light</span>
    <span class="token-value">28 · h3</span>
    <span class="token-value">22 · h4 med</span>
    <span class="token-value">16 · body</span>
    <span class="token-value">12 · mono</span>
  </div>
</div>
</body></html>
