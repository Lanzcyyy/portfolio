<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="padding: 24px 32px;">
  <div class="label" style="margin-bottom: 14px;">Azure — brand accent · use sparingly</div>
  <div style="display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px;">
    <div>
      <div style="background: #EEF2FB; height: 60px;"></div>
      <div class="token-name" style="margin-top: 6px;">50</div>
    </div>
    <div>
      <div style="background: #DCE4F5; height: 60px;"></div>
      <div class="token-name" style="margin-top: 6px;">100</div>
    </div>
    <div>
      <div style="background: #8FA5E0; height: 60px;"></div>
      <div class="token-name" style="margin-top: 6px;">300</div>
    </div>
    <div>
      <div style="background: #2547C8; height: 60px; outline: 1px solid var(--ink-1); outline-offset: -1px;"></div>
      <div class="token-name" style="margin-top: 6px; color: var(--azure-500);">500 ★</div>
      <div class="token-value">#2547C8</div>
    </div>
    <div>
      <div style="background: #1B36A8; height: 60px;"></div>
      <div class="token-name" style="margin-top: 6px;">600</div>
    </div>
    <div>
      <div style="background: #122480; height: 60px;"></div>
      <div class="token-name" style="margin-top: 6px;">700</div>
    </div>
  </div>
</div>
</body></html>
