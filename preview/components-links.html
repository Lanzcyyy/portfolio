<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<style>
  .link {
    font-family: var(--font-body); color: var(--ink-1); text-decoration: none;
    background-image: linear-gradient(var(--azure-500), var(--azure-500));
    background-size: 100% 1px; background-position: 0 100%; background-repeat: no-repeat;
    padding-bottom: 2px;
  }
  .link-quiet {
    color: var(--ink-1); text-decoration: none;
    background-image: linear-gradient(var(--ink-4), var(--ink-4));
    background-size: 100% 1px; background-position: 0 100%; background-repeat: no-repeat;
    padding-bottom: 2px;
  }
  .link-draw {
    color: var(--ink-1); text-decoration: none; position: relative;
    padding-bottom: 2px;
  }
  .link-draw::after {
    content: ''; position: absolute; left: 0; bottom: 0; width: 60%; height: 1px;
    background: var(--azure-500); transition: width 600ms cubic-bezier(0.16,1,0.3,1);
  }
</style>
<div class="card" style="padding: 24px 32px;">
  <div class="label" style="margin-bottom: 14px;">Links</div>
  <div style="display: flex; gap: 28px; flex-wrap: wrap; font-size: 16px;">
    <a class="link" href="#">Resting accent</a>
    <a class="link-quiet" href="#">Quiet body link</a>
    <a class="link-draw" href="#">Draws on hover</a>
    <a href="#" style="font-family: var(--font-mono); font-size: 13px; color: var(--azure-500); text-decoration: none;">↗ External</a>
  </div>
  <div class="token-value" style="margin-top: 14px;">underline always sits 1px below baseline · accent or ghost · draws L→R on hover</div>
</div>
</body></html>
