<!-- @dsCard group="Brand" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="padding: 24px 32px;">
  <div class="label" style="margin-bottom: 18px;">Logomark — single initial + mono dot · sans only</div>
  <div style="display: flex; gap: 40px; align-items: center;">
    <div style="display: flex; align-items: baseline; gap: 3px;">
      <span style="font-family: var(--font-body); font-weight: 500; font-size: 76px; line-height: 0.9; color: var(--ink-1); letter-spacing: -0.04em;">M</span>
      <span style="width: 8px; height: 8px; background: var(--azure-500); border-radius: 999px; display: inline-block; transform: translateY(-4px);"></span>
    </div>
    <div style="display: flex; align-items: baseline; gap: 2px;">
      <span style="font-family: var(--font-body); font-weight: 500; font-size: 44px; line-height: 0.9; color: var(--ink-1); letter-spacing: -0.04em;">M</span>
      <span style="width: 5px; height: 5px; background: var(--azure-500); border-radius: 999px; display: inline-block; transform: translateY(-2px);"></span>
    </div>
    <div style="display: flex; align-items: baseline; gap: 1px;">
      <span style="font-family: var(--font-body); font-weight: 500; font-size: 22px; line-height: 0.9; color: var(--ink-1); letter-spacing: -0.04em;">M</span>
      <span style="width: 3px; height: 3px; background: var(--azure-500); border-radius: 999px; display: inline-block; transform: translateY(-1px);"></span>
    </div>
    <div style="background: var(--ink-1); padding: 14px 22px; display: flex; align-items: baseline; gap: 2px;">
      <span style="font-family: var(--font-body); font-weight: 500; font-size: 34px; line-height: 0.9; color: var(--paper-1); letter-spacing: -0.04em;">M</span>
      <span style="width: 4px; height: 4px; background: var(--azure-300); border-radius: 999px; display: inline-block; transform: translateY(-2px);"></span>
    </div>
    <div style="display: flex; flex-direction: column; gap: 4px;">
      <div style="display: flex; align-items: baseline; gap: 2px;">
        <span style="font-family: var(--font-body); font-weight: 500; font-size: 26px; line-height: 0.9; color: var(--ink-1); letter-spacing: -0.04em;">M</span>
        <span style="width: 4px; height: 4px; background: var(--azure-500); border-radius: 999px; display: inline-block; transform: translateY(-2px);"></span>
      </div>
      <div style="font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.18em; color: var(--ink-3);">MAREN ITO</div>
      <div style="font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.18em; color: var(--ink-3);">DESIGNER</div>
    </div>
  </div>
</div>
</body></html>
