<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="padding: 24px 32px;">
  <div class="label" style="margin-bottom: 14px;">Spacing scale — 4px base</div>
  <div style="display: flex; align-items: flex-end; gap: 10px;">
    <div style="text-align: center;">
      <div style="background: var(--azure-500); width: 4px; height: 4px;"></div>
      <div class="token-value" style="margin-top: 8px;">1</div>
    </div>
    <div style="text-align: center;">
      <div style="background: var(--azure-500); width: 8px; height: 8px;"></div>
      <div class="token-value" style="margin-top: 8px;">2</div>
    </div>
    <div style="text-align: center;">
      <div style="background: var(--azure-500); width: 12px; height: 12px;"></div>
      <div class="token-value" style="margin-top: 8px;">3</div>
    </div>
    <div style="text-align: center;">
      <div style="background: var(--azure-500); width: 16px; height: 16px;"></div>
      <div class="token-value" style="margin-top: 8px;">4</div>
    </div>
    <div style="text-align: center;">
      <div style="background: var(--azure-500); width: 24px; height: 24px;"></div>
      <div class="token-value" style="margin-top: 8px;">5</div>
    </div>
    <div style="text-align: center;">
      <div style="background: var(--azure-500); width: 32px; height: 32px;"></div>
      <div class="token-value" style="margin-top: 8px;">6</div>
    </div>
    <div style="text-align: center;">
      <div style="background: var(--azure-500); width: 48px; height: 48px;"></div>
      <div class="token-value" style="margin-top: 8px;">7</div>
    </div>
    <div style="text-align: center;">
      <div style="background: var(--azure-500); width: 64px; height: 64px;"></div>
      <div class="token-value" style="margin-top: 8px;">8</div>
    </div>
    <div style="text-align: center;">
      <div style="background: var(--azure-500); width: 96px; height: 96px;"></div>
      <div class="token-value" style="margin-top: 8px;">9</div>
    </div>
  </div>
</div>
</body></html>
