<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="padding: 24px 32px;">
  <div class="label" style="margin-bottom: 14px;">Semantic mapping</div>
  <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;">
    <div style="background: #F8F4EC; padding: 14px; border: 1px solid var(--border);">
      <div class="token-name">--bg</div>
      <div class="token-value" style="color: var(--ink-3);">paper-1</div>
    </div>
    <div style="background: #FFFFFF; padding: 14px; border: 1px solid var(--border);">
      <div class="token-name">--surface</div>
      <div class="token-value" style="color: var(--ink-3);">paper-0</div>
    </div>
    <div style="background: #FFFFFF; padding: 14px; border: 1px solid var(--border);">
      <div class="token-name" style="color: #0E1A36;">--fg</div>
      <div class="token-value">ink-1</div>
    </div>
    <div style="background: #FFFFFF; padding: 14px; border: 1px solid var(--border);">
      <div class="token-name" style="color: #2547C8;">--accent</div>
      <div class="token-value">azure-500</div>
    </div>
  </div>
</div>
</body></html>
