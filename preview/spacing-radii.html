<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="padding: 24px 32px;">
  <div class="label" style="margin-bottom: 14px;">Radii — sharp by default · pill for CTAs · md for cards</div>
  <div style="display: flex; gap: 18px; align-items: center;">
    <div style="text-align: center;">
      <div style="width: 60px; height: 60px; background: #FFFFFF; border: 1px solid var(--border); border-radius: 0;"></div>
      <div class="token-name" style="margin-top: 8px;">r-0</div>
      <div class="token-value">0</div>
    </div>
    <div style="text-align: center;">
      <div style="width: 60px; height: 60px; background: #FFFFFF; border: 1px solid var(--border); border-radius: 2px;"></div>
      <div class="token-name" style="margin-top: 8px;">r-xs</div>
      <div class="token-value">2</div>
    </div>
    <div style="text-align: center;">
      <div style="width: 60px; height: 60px; background: #FFFFFF; border: 1px solid var(--border); border-radius: 4px;"></div>
      <div class="token-name" style="margin-top: 8px;">r-sm</div>
      <div class="token-value">4</div>
    </div>
    <div style="text-align: center;">
      <div style="width: 60px; height: 60px; background: #FFFFFF; border: 1px solid var(--border); border-radius: 8px;"></div>
      <div class="token-name" style="margin-top: 8px;">r-md ★</div>
      <div class="token-value">8</div>
    </div>
    <div style="text-align: center;">
      <div style="width: 60px; height: 60px; background: #FFFFFF; border: 1px solid var(--border); border-radius: 14px;"></div>
      <div class="token-name" style="margin-top: 8px;">r-lg</div>
      <div class="token-value">14</div>
    </div>
    <div style="text-align: center;">
      <div style="width: 100px; height: 40px; background: var(--azure-500); border-radius: 999px;"></div>
      <div class="token-name" style="margin-top: 8px;">r-pill ★</div>
      <div class="token-value">999</div>
    </div>
  </div>
</div>
</body></html>
